services:
  simulator:
    build:
      context: .
      dockerfile: docker/simulator/Dockerfile
      args:
        EVEN_CODEX_RUNTIME_USER: ${EVEN_CODEX_RUNTIME_USER}
        EVEN_CODEX_HOST_UID: ${EVEN_CODEX_HOST_UID}
        EVEN_CODEX_HOST_GID: ${EVEN_CODEX_HOST_GID}
    group_add:
      - "27"
    environment:
      EVEN_CODEX_WORKSPACE_REF: ${EVEN_CODEX_WORKSPACE_REF}
      EVEN_CODEX_CODEX_SESSION_ID: ${EVEN_CODEX_CODEX_SESSION_ID}
      EVEN_CODEX_WORKSPACE_PATH: ${EVEN_CODEX_WORKSPACE_PATH}
      EVEN_CODEX_RUNTIME_USER: ${EVEN_CODEX_RUNTIME_USER}
      EVEN_CODEX_NOVNC_PORT: ${EVEN_CODEX_NOVNC_PORT}
      EVEN_CODEX_VNC_PORT: ${EVEN_CODEX_VNC_PORT}
      EVEN_CODEX_DASHBOARD_PORT: ${EVEN_CODEX_DASHBOARD_PORT}
      EVEN_CODEX_BRIDGE_HOST_PORT: ${EVEN_CODEX_BRIDGE_HOST_PORT}
      EVEN_CODEX_APP_HOST_PORT: ${EVEN_CODEX_APP_HOST_PORT}
      EVEN_CODEX_AUTOMATION_HOST_PORT: ${EVEN_CODEX_AUTOMATION_HOST_PORT}
      EVEN_CODEX_CONNECTOR_MODE: ${EVEN_CODEX_CONNECTOR_MODE}
      EVEN_CODEX_CONNECTOR_API_KEY: ${EVEN_CODEX_CONNECTOR_API_KEY}
      EVEN_CODEX_CONNECTOR_API_SECRET: ${EVEN_CODEX_CONNECTOR_API_SECRET}
    ports:
      - "${EVEN_CODEX_NOVNC_PORT}:6080"
      - "${EVEN_CODEX_VNC_PORT}:5900"
      - "${EVEN_CODEX_DASHBOARD_PORT}:7890"
      - "${EVEN_CODEX_BRIDGE_HOST_PORT}:6789"
      - "${EVEN_CODEX_APP_HOST_PORT}:4173"
      - "${EVEN_CODEX_AUTOMATION_HOST_PORT}:9898"
    volumes:
      - "${HOME}/.codex:/home/${EVEN_CODEX_RUNTIME_USER}/.codex"
      - "${HOME}/.developer-dashboard/config/auth:/opt/even-codex-host-auth:ro"
      - "${EVEN_CODEX_WORKSPACE_PATH}:${EVEN_CODEX_WORKSPACE_PATH}"
